name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          platforms=(
            "windows:amd64:.zip"
            "linux:amd64:.tar.gz"
            "linux:arm64:.tar.gz"
            "darwin:amd64:.tar.gz"
            "darwin:arm64:.tar.gz"
          )
          
          for entry in "${platforms[@]}"; do
            IFS=':' read -r os arch ext <<< "$entry"
            
            output_dir="dist/${os}-${arch}"
            mkdir -p "$output_dir"
            
            ext_suffix="${ext%.gz}"
            binary_name="mirror"
            if [ "$os" = "windows" ]; then
              binary_name="mirror.exe"
            fi
            
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build \
              -ldflags="-s -w -X gh-mirror/internal/app.Version=${{ github.ref_name }}" \
              -o "$output_dir/$binary_name" \
              ./cmd/mirror
            
            if [ "$ext" = ".zip" ]; then
              cd "$output_dir" && zip -r "../../dist/mirror-${os}-${arch}.zip" . && cd ../..
            else
              cd "$output_dir" && tar -czf "../../dist/mirror-${os}-${arch}.tar.gz" . && cd ../..
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
